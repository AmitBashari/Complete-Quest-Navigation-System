<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Pass Quest Complete - Refined Exit</title>
    <style>
        :root {
            --bg-color: #0c0d10;
            --toast-bg: #d2a679; 
            --toast-border: #a67c52;
            --title-color: #5c3a21;
            --desc-color: #3b2415;
            
            /* ⚡ Snappy Physics ⚡ */
            --slide-enter: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --pop-enter: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'system-ui', -apple-system, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
            gap: 20px;
        }

        /* Phone Blueprint Frame */
        .phone-canvas {
            width: 380px;
            height: 780px;
            background: linear-gradient(to bottom, #4f7cac, #213a5f);
            position: relative;
            border-radius: 44px;
            border: 12px solid #000;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* HARD RESET */
        .phone-canvas.instant-reset * {
            transition: none !important;
            animation: none !important;
        }

        /* ---------------------------------------------------
           TOAST STYLING & POSITIONING
           --------------------------------------------------- */
        .toast-container {
            position: absolute;
            top: 150px; 
            left: 0; 
            width: 88%; 
            background-color: var(--toast-bg);
            border-top: 3px solid var(--toast-border);
            border-bottom: 3px solid var(--toast-border);
            border-right: 3px solid var(--toast-border);
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            
            /* Initial Hidden State */
            transform: translateX(-110%);
            opacity: 0;
            
            /* Ribbon cut out effect on the right side */
            clip-path: polygon(0% 0%, 95% 0%, 100% 50%, 95% 100%, 0% 100%);
        }

        .toast-title {
            color: var(--title-color);
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            
            /* Force Single Line */
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            
            /* Initial Hidden State */
            transform: scale(0.5);
            opacity: 0;
        }

        .toast-desc {
            color: var(--desc-color);
            font-weight: 600;
            font-size: 0.85rem;
            
            /* Initial Hidden State */
            transform: translateY(10px);
            opacity: 0;
        }

        /* ---------------------------------------------------
           ENTRANCE CHOREOGRAPHY (.active state)
           --------------------------------------------------- */
        .phone-canvas.active .toast-container {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.5s var(--slide-enter), opacity 0.3s ease;
        }

        .phone-canvas.active .toast-title {
            transform: scale(1);
            opacity: 1;
            transition: transform 0.4s var(--pop-enter) 0.25s, opacity 0.3s ease 0.25s;
        }

        .phone-canvas.active .toast-desc {
            transform: translateY(0);
            opacity: 1;
            transition: transform 0.3s ease 0.35s, opacity 0.3s ease 0.35s;
        }

        /* ---------------------------------------------------
           EXIT CHOREOGRAPHY (.exit state)
           --------------------------------------------------- */
        .phone-canvas.exit .toast-title {
            transform: scale(1); /* Lock scale so it doesn't shrink */
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .phone-canvas.exit .toast-desc {
            transform: translateY(0); /* Lock position so it doesn't drop */
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .phone-canvas.exit .toast-container {
            transform: translateX(0); /* Keep it exactly in place */
            opacity: 0;
            transition: opacity 0.4s ease 0.1s;
        }

        /* Controls */
        .master-btn { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-weight: 800; font-size: 1rem; border-radius: 14px; cursor: pointer; box-shadow: 0 6px 0 #b33139; margin-top: 10px; }
        .master-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b33139; }
    </style>
</head>
<body>

    <div class="phone-canvas" id="appCanvas">
        <div class="toast-container">
            <div class="toast-title">Battle Pass Quest Complete</div>
            <div class="toast-desc">Claim all Session Rewards (X) Times</div>
        </div>
    </div>

    <button class="master-btn" onclick="triggerToast()">⚡ Trigger Side-Toast</button>

    <script>
        const appCanvas = document.getElementById('appCanvas');
        let exitTimer;

        function triggerToast() {
            clearTimeout(exitTimer);

            // Hard Reset
            appCanvas.classList.add('instant-reset');
            appCanvas.classList.remove('active', 'exit');
            void appCanvas.offsetWidth; 
            
            // Start Entrance
            appCanvas.classList.remove('instant-reset');
            appCanvas.classList.add('active');

            // Wait 4 seconds, then trigger fade-on-spot exit
            exitTimer = setTimeout(() => {
                appCanvas.classList.remove('active');
                appCanvas.classList.add('exit');
            }, 4000); 
        }

        window.onload = triggerToast;
    </script>
</body>
</html>
